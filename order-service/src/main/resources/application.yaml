# порт приложения
server:
  port: 8081

# \u041D\u0430\u0437\u0432\u0430\u043D\u0438\u0435 \u043F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u044F
spring:
  application:
    name: order-service

  # настройка бд H2
  datasource:
    url: jdbc:h2:mem:orderdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # настройка консоли H2
  h2:
    console:
      enabled: true

  # настройка Hibernate
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

# настройка OpenAPI (Swagger)
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /

feign:
  resilience4j:
    enabled: true
  client:
    config:
      paymentClient:
        readTimeout: 5000

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
    consumer:
      group-id: order-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: ru.v_and_a.kafka.events

kafka:
  topic:
    order-creation-status: order.creation.status
    payment-request: payment.request
    payment-cancel: payment.cancel
    delivery-request: delivery.request

# \u0421\u0441\u044B\u043B\u043A\u0430 \u043D\u0430 payment-service
payment:
  service:
    url: http://localhost:8082

# Настройка Resilience4j
resilience4j:

  retry:
    instances:
      paymentClient:
        maxAttempts: 3
        waitDuration: 2s
        retryExceptions:
          - java.net.ConnectException
          - java.net.SocketTimeoutException
          - feign.RetryableException
          - feign.FeignException

  circuitbreaker:
    instances:
      paymentClient:
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        slidingWindowSize: 10

  ratelimiter:
    instances:
      paymentClient:
        limitForPeriod: 3          # 10 запросов за период
        limitRefreshPeriod: 10s      # период = 1 секунда
        timeoutDuration: 0s

  bulkhead:
    instances:
      paymentClient:
        maxConcurrentCalls: 2 # Максимальное число параллельных вызовов, разрешенных одновременно
        maxWaitDuration: 0s # Время ожидания, если все слоты заняты;

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers,metrics
logging:
  level:
    io.github.resilience4j.retry: DEBUG
    io.github.resilience4j.ratelimiter: DEBUG
    io.github.resilience4j.bulkhead: DEBUG
    ru.v_and_a: DEBUG