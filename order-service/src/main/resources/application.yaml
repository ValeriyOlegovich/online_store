# \u041F\u043E\u0440\u0442 \u0441\u0435\u0440\u0432\u0435\u0440\u0430
server:
  port: 8081

# \u041D\u0430\u0437\u0432\u0430\u043D\u0438\u0435 \u043F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u044F
spring:
  application:
    name: order-service

  # \u041D\u0430\u0441\u0442\u0440\u043E\u0439\u043A\u0430 H2
  datasource:
    url: jdbc:h2:mem:orderdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # \u0412\u043A\u043B\u044E\u0447\u0435\u043D\u0438\u0435 \u043A\u043E\u043D\u0441\u043E\u043B\u0438 H2
  h2:
    console:
      enabled: true

  # \u041D\u0430\u0441\u0442\u0440\u043E\u0439\u043A\u0430 JPA \u0438 Hibernate
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

# \u041D\u0430\u0441\u0442\u0440\u043E\u0439\u043A\u0430 OpenAPI (Swagger)
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /

feign:
  resilience4j:
    enabled: true

# \u0421\u0441\u044B\u043B\u043A\u0430 \u043D\u0430 payment-service
payment:
  service:
    url: http://localhost:8082

# Настройка Resilience4j Circuit Breaker
resilience4j.retry:
  instances:
    paymentClient:
      maxAttempts: 3
      waitDuration: 2s
      retryExceptions:
        - java.net.ConnectException
        - java.net.SocketTimeoutException
        - feign.RetryableException
        - feign.FeignException

resilience4j.circuitbreaker:
  instances:
    paymentClient:
      failureRateThreshold: 50
      waitDurationInOpenState: 30s
      slidingWindowSize: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers,metrics
logging:
  level:
    io.github.resilience4j: DEBUG
    io.github.resilience4j.retry: DEBUG