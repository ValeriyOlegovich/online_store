# Порт сервера
server:
  port: 8082

# Название приложения
spring:
  application:
    name: payment-service

  # Настройка подключения к базе данных H2
  datasource:
    url: jdbc:h2:mem:paymentdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # Включение веб-консоли H2
  h2:
    console:
      enabled: true

  # Настройка JPA и Hibernate
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

# Настройка OpenAPI (Swagger)
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /

# ????????? ??? openApi(swagger)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/